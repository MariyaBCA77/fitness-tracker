<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏃 Fitness Tracker</h1>
<p>Track your daily activity and calories burned</p>

<div class="container">

<h2>Steps Walked</h2>
<input type="number" id="steps" placeholder="Number of steps">

<h2>Workout Minutes</h2>
<input type="number" id="workout" placeholder="Minutes of workout">

<h2>Water Intake (cups)</h2>
<input type="number" id="water" placeholder="Cups of water">

<br><br>
<button onclick="calculateFitness()">Calculate Fitness Score</button>

<h2 id="result"></h2>
<p id="suggestion"></p>

</div>

<script src="script.js"></script>
</body>
</html>
